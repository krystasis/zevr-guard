name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The threat databases are generated at release time from upstream
      # feeds and are not committed. Provide empty stand-ins so the type
      # checker, tests and bundler run deterministically without network.
      - name: Provide placeholder threat data
        run: |
          [ -f src/data/malware.json ] || echo '[]' > src/data/malware.json
          [ -f src/data/trackers.json ] || echo '{}' > src/data/trackers.json

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build extension
        run: npm run build:app
